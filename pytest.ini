[pytest]
# Diretórios de teste
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções de output
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Marcadores customizados
markers =
    unit: marca teste como unitário
    integration: marca teste como de integração
    slow: marca teste como demorado
    
# Coverage
[coverage:run]
source = .
omit = 
    tests/*
    .venv/*
    */__pycache__/*
